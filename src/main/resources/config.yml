# ============================================================
# ALInvite 主配置文件
# 说明：本文件仅包含插件功能设置，所有玩家可见文本请在 languages 文件夹的语言文件中修改。
# ============================================================

# 配置文件版本（请勿修改）
version: 2

# ==================== 语言设置 ====================
language:
  locale: "zh_cn"               # 语言文件标识（对应 languages 文件夹下的文件名，不带 .yml 后缀）
  # 可选值：zh_cn（中文）、en_us（英文）

# ==================== 邀请码设置 ====================
invite_code:
  # 每个玩家独立邀请码的生成规则（不是全局固定码）
  length: 6                     # 自动生成的邀请码长度（建议 4-8 位，太短容易冲突，太长不好记）
  charset: "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789"  # 允许的字符集（已排除易混淆字符 I、O、0、1）
  prefix: ""                    # 邀请码前缀（例如设置为 "AL-"，最终生成的码如 "AL-ABC123"）
  # 权限要求（玩家需要拥有对应权限才能使用相应功能）
  veteran_permission: "alinvite.veteran"  # 老玩家需要此权限才能拥有自己的邀请码（拥有此权限的玩家可以邀请别人）
  use_permission: "alinvite.use"          # 新玩家需要此权限才能填写邀请码（没有此权限的新玩家无法使用邀请功能）
  allow_veteran_to_bind: false   # 是否允许老玩家（已有邀请码）绑定其他老玩家的邀请码
  # true: 允许老玩家绑定老玩家（通常不建议开启）
  # false: 禁止老玩家绑定老玩家

# ==================== IP 限制 ====================
ip_restriction:
  enabled: false                 # 是否启用同IP绑定限制
  # 如果 enabled=true：完全禁止同IP绑定（下面的配置无效）
  # 如果 enabled=false：允许同IP绑定，但根据 flexible_mode 限制功能
  flexible_mode:
    milestone: false             # 同IP绑定：里程碑功能禁用（false = 禁用）
    rebate: true                 # 同IP绑定：返点功能启用（true = 启用）
    gift: false                  # 同IP绑定：礼包功能禁用（false = 禁用）

# ==================== 新玩家奖励（默认礼包）====================
new_player_reward:
  # 当老玩家未购买任何礼包时，使用此默认礼包 ID（必须对应 gift_shop.gifts 中定义的礼包）
  default_gift_id: "default"
  # 是否强制要求老玩家必须购买礼包才能让新玩家获得奖励
  # true: 老玩家必须购买礼包，否则新玩家无奖励
  # false: 老玩家未购买时使用 default_gift_id 的礼包
  require_gift: false

# ==================== 老玩家累计奖励里程碑 ====================
# 里程碑系统：当老玩家累计邀请达到指定人数时，发放额外奖励
# 键为所需邀请人数，值为里程碑配置
milestones:
  auto_claim: false              # （不建议开启）里程碑奖励自动发放模式：true=达到条件时自动发放，false=需要手动在菜单中领取
  1:
    name: "社交新星"             # 里程碑称号（会显示在公告和奖励说明中）
    lore:                        # 里程碑奖励的描述（显示在菜单中）
      - "&a100 金币"
      - "&b10 点券"
    rewards:                     # 里程碑奖励列表（达到条件时自动发放）
      - type: "money"            # 奖励类型：command（执行命令）、money（金币）、points（点券）、item（物品）
        value: 100               # money 类型的值：金币数量 command 类型的值：命令（%player% 会替换为玩家名）
      - type: "points"
        value: 10                # points 类型的值：点券数量
  5:
    name: "社交达人"
    lore:
      - "&a500 金币"
      - "&b50 点券"
    rewards:
      - type: "money"
        value: 5000
      - type: "points"
        value: 100
  10:
    name: "社交传奇"
    lore:
      - "&a10000 金币"
      - "&b1000 点券"
    rewards:
      - type: "money"
        value: 10000
      - type: "points"
        value: 1000

# ==================== 礼包商店 ====================
gift_shop:
  enabled: true                 # 是否启用礼包购买功能
  # 当玩家未购买任何礼包时，在礼包商店的 W 位置显示的预览信息
  default_gift_preview:
    material: "BARRIER"         # 显示的物品材质（使用 Spigot 材质ID）
    custom-model-data: 0        # 自定义模型数据（用于资源包自定义物品）
    name: "未购买礼包"          # 显示的物品名称（支持颜色代码 &）
    lore:                       # 物品描述（支持颜色代码 &，每行一条）
      - "请从下方购买礼包"
      - "购买后，你邀请的新玩家将获得该礼包"

  # 礼包定义列表（可任意增加或删除）
  gifts:
    # 默认礼包（ID 必须与 new_player_reward.default_gift_id 一致）
    # 当老玩家没有购买任何礼包时，新玩家会获得此默认礼包的奖励
    default:
      name: "&6基础礼包"
      material: "GOLD_INGOT"
      custom-model-data: 0
      price_money: 0            # 价格：金币（0 表示免费）
      price_points: 0           # 价格：点券（0 表示不需要点券）
      duration_days: 0          # 购买时限：天数（0 表示永久）
      rewards:                   # 礼包奖励内容（当新玩家绑定此老玩家时，新玩家获得这些奖励）
        - type: "money"
          value: 50             # 奖励金币数量
        - type: "item"
          value: "COOKED_BEEF 64"  # 奖励物品：物品ID 数量
      lore:
        - "&7新玩家将获得:"
        - "&a50 金币"
        - "&a64 个熟牛肉"
    # 基础礼包（玩家可购买此礼包来提升新玩家奖励）
    basic_gift:
      name: "&6普通礼包"
      material: "CHEST"
      custom-model-data: 0
      price_money: 500          # 价格：500 金币
      price_points: 50          # 价格：50 点券
      duration_days: 0          # 购买时限：天数（0 表示永久）
      rewards:                   # 老玩家购买后，新玩家获得的奖励
        - type: "command"
          value: "give %player% iron_ingot 16"
        - type: "command"
          value: "give %player% cooked_beef 32"
        - type: "money"
          value: 50
        - type: "points"
          value: 5
      lore:
        - "&7购买后，你邀请的新玩家将获得："
        - "&a16 个铁锭"
        - "&a32 个熟牛肉"
        - "&a50 金币"
        - "&a5 点券"
    # 高级礼包
    premium_gift:
      name: "&6高级礼包"
      material: "ENDER_CHEST"
      custom-model-data: 0
      price_money: 2000
      price_points: 200
      duration_days: 30         # 购买时限：30天
      rewards:
        - type: "command"
          value: "give %player% diamond 10"
        - type: "command"
          value: "give %player% enchanted_golden_apple 1"
        - type: "money"
          value: 300
        - type: "points"
          value: 30
      lore:
        - "&7购买后，你邀请的新玩家将获得："
        - "&a10 个钻石"
        - "&a1 个附魔金苹果"
        - "&a300 金币"
        - "&a30 点券"
# ==================== 全服公告设置 ====================
announcements:
  enabled: true                 # 是否启用里程碑公告
  # true: 玩家达到里程碑时全服广播公告
  # false: 禁用公告（但奖励仍会正常发放）
  mode: "BROADCAST"             # 公告方式：
  # BROADCAST：全服所有玩家都能看到
  # WORLD：只有达到里程碑的玩家所在世界能看到
  # CONSOLE：只在服务器控制台显示，不广播给玩家
  cross_server_sync: true       # 是否启用跨服同步（需数据库支持，用于多服务器集群）
  # true: 公告会同步到数据库，其他服务器也会播放
  # false: 只在当前服务器播放
  sync_interval: 5              # 跨服同步轮询间隔（秒）
  # 设置多久检查一次数据库获取其他服务器的公告
  # 数值越小同步越快，但会增加数据库负担
  # 公告消息模板，支持 PlaceholderAPI 变量
  # 键为里程碑人数，default 为默认格式（当没有对应的里程碑消息时使用）
  messages:
    default: "&6[邀请系统] &e{player} &a累计邀请人数达到 &6{total} &a人，获得里程碑 &6{milestone_name}&a！"
    1: "&a⭐ {player} 成为了社交新星，邀请 1 人！"
    5: "&b✨ {player} 成为了社交达人，邀请 5 人！"
    10: "&6🔥 {player} 成为了社交传奇，邀请 10 人！恭喜！"
  send_only_once: true          # 是否每个里程碑只发送一次公告（建议保持 true）
  # true: 每个里程碑每人只公告一次（即使重复达到也不公告）
  # false: 每次达到都公告（可能造成刷屏）

# ==================== 输入对话框设置 ====================
input_dialog:
  cancel_key: "Q"               # 取消输入的快捷键（按此键取消当前的输入操作）
  timeout: 30                   # 输入超时时间（秒）
  # 如果玩家在这个时间内没有输入，菜单会自动关闭

# ==================== 排行榜设置 ====================
leaderboard:
  # 排行榜更新间隔（单位：秒）
  # 默认为 3600 秒（1小时）
  update_interval: 3600

# ==================== 数据存储 ====================
database:
  type: "sqlite"                # 数据库类型：
  # sqlite：使用 SQLite（轻量级，无需配置，适合单机服务器）
  # mysql：使用 MySQL（需要额外配置，适合多服务器集群）
  sqlite_file: "data.db"        # SQLite 数据库文件名（相对于插件文件夹）
  # 修改后会自动创建新的空数据库
  table_prefix: "alinvite_"     # 所有表名前缀（避免与其他插件的表名冲突）
  # 如果服务器上有多个 ALInvite 实例，必须使用不同的前缀
  server_id: "default"          # 当前服务器的唯一标识（用于跨服同步时区分消息来源）
  # 如果服务器集群中有多个服务器，每个服务器必须使用不同的 ID
  # 数据库连接池重连配置
  auto_reconnect: true          # 是否启用自动重连机制
  # true: 当连接池关闭时自动尝试重新连接
  # false: 不自动重连，需要手动重启插件
  max_reconnect_attempts: 3     # 最大重连尝试次数（0 表示无限重试）
  reconnect_delay_ms: 5000      # 重连间隔时间（毫秒）
  # 两次重连尝试之间的等待时间
  mysql:                        # MySQL 配置（仅当 type=mysql 时生效）
    host: "localhost"           # MySQL 服务器地址
    port: 3306                  # MySQL 服务器端口
    database: "minecraft"       # 数据库名称（需要提前创建）
    user: "root"                # 数据库用户名
    password: ""                 # 数据库密码
    pool_size: 10               # 数据库连接池大小（同时保持的连接数）
  # 连接数过少会影响性能，过多会占用过多资源
    connection_timeout: 30000   # 连接超时时间（毫秒）
  # 如果数据库连接超过这个时间没有响应，会报错

# ==================== 性能设置 ====================
performance:
  async_db: true                # 是否异步执行数据库操作（推荐 true）
  # true: 数据库操作在后台线程执行，不影响游戏流畅度
  # false: 数据库操作在主线程执行，可能造成卡顿
  cache_invite_code_ttl: 30     # 邀请码缓存时间（分钟）
  # 邀请码会被缓存以减少数据库查询
  # 数值越大查询越快，但邀请码更新延迟越高
  cache_stats_ttl: 30           # 邀请统计缓存时间（分钟）
  # 玩家的邀请数量等信息会被缓存
  cache_gift_ttl: 60            # 礼包数据缓存时间（分钟）
  # 礼包商店信息会被缓存
  use_folia_scheduler: true     # 是否使用 Folia 的调度器（自动检测）
  # Folia 是一种支持分世界的服务端
  # true: 自动检测 Folia 并使用对应的调度器
  # false: 始终使用标准 Bukkit 调度器

# ==================== 经济与点券 ====================
economy:
  vault_enabled: true           # 是否启用 Vault 经济集成
  # true: 使用 Vault API 发放金币（支持大部分经济插件）
  # false: 不使用 Vault，金币相关功能可能不可用
  points_type: "PLAYERPOINTS"    # 点券/积分类型：
  # NONE：禁用点券功能
  # PLAYERPOINTS：使用 PlayerPoints 插件（需要安装）
  # CUSTOM：使用自定义命令
  # 自定义点券命令（当 points_type = CUSTOM 时使用）
  points_command:
    give: "points give %player% %amount%"    # 给予玩家点券的命令（%player% 替换为玩家名，%amount% 替换为数量）
    take: "points take %player% %amount%"    # 扣除玩家点券的命令
    balance: "points balance %player%"       # 查询玩家点券余额的命令
  # 金币命令（用于离线玩家金币发放，通过 /money give %player% %amount% 发放）
  # 当老玩家离线时，金币会通过此命令发放
  money_command:
    give: "money give %player% %amount%"     # 给予玩家金币的命令（%player% 替换为玩家名，%amount% 替换为数量）
              # 前提：此命令必须支持离线玩家（根据玩家名发放）

# ==================== 权限组奖励 ====================
# 当新玩家进入指定权限组时，奖励邀请他的老玩家
# 例如：A邀请了B，B加入了"lv5"权限组，A就会获得lv5对应的金币和点券奖励
# 注意：需要新玩家拥有对应的权限节点才会触发奖励
permission_group_rewards:
  enabled: true                 # 是否启用权限组奖励功能
  # true: 启用（当新玩家获得指定权限时，奖励老玩家）
  # false: 禁用
  # 监听方式：检测玩家是否拥有 权限前缀.组名 权限节点
  check_mode: "PERMISSION"
  # 权限前缀，例如设置为 "alinvite" 则检测 "alinvite.lv5" 权限
  # 新玩家需要拥有 alinvite.lv5 权限才会触发 lv5 的奖励
  permission_prefix: "alinvite"
  # 在线玩家权限变化检测间隔（秒），用于实时检测权限变更（LuckPerms用户可设为10秒以下）
  # 数值越小检测越实时，但会增加性能消耗
  # LuckPerms 用户建议设为 5-10 秒，其他权限插件建议 10-30 秒
  check_interval: 10
  rewards:
    # 权限组名称（可自定义，需要与你的权限插件中的组名一致）
    # 例如玩家加入了 svip 组，则奖励 svip 对应的金币和点券
    # weight: 权重数值，越大约先检测（用于处理权限继承问题，数值高的权限组优先）
    # 当玩家同时拥有多个权限组时，只会触发权重最高的那个组
    "lv2":
      money: 100                # 老玩家获得的金币数量（当被邀请的新玩家获得 lv2 权限时）
      points: 0                  # 老玩家获得的点券数量
      weight: 2                  # 权重值（数值越大优先级越高，用于处理权限继承）
    "lv3":
      money: 200
      points: 0
      weight: 3
    "lv4":
      money: 500
      points: 0
      weight: 4
    "lv5":
      money: 1000
      points: 100
      weight: 5
    "lv6":
      money: 2000
      points: 200
      weight: 6

# ==================== 点券充值返点 ====================
# 使用 /alinvite givedj 命令为玩家充值点券，给邀请人发放返点奖励
points_rebate:
  enabled: true                 # 是否启用点券充值返点功能
  # true: 启用返点功能
  # false: 禁用返点功能
  
  # 点券发放命令（当玩家充值成功时执行此命令发放点券）
  points_command: "points give {player} {amount}"  # {player} 替换为玩家名，{amount} 替换为点券数量
  
  # 权限前缀配置
  permission_prefix: "alinvite.rebate"  # 返点权限前缀
  # 权限节点格式：权限前缀.权限组名称
  # 例如设置为 "alinvite.rebate" 则检测 "alinvite.rebate.vip" 权限
  # 邀请人需要拥有对应的权限节点才能获得相应返点比例
  
  # 返点比例配置（基于权限组）
  # 格式：权限组名称 -> 返点比例配置
  # 当邀请人拥有对应权限组时，使用该组的返点比例
  # weight: 权重数值，越大约先检测（用于处理权限继承问题，数值高的权限组优先）
  # 当玩家同时拥有多个权限组时，使用权重最高的返点比例
  # 
  # 返点逻辑：
  # 1. 所有玩家默认获得5%返点（无需任何权限）
  # 2. 拥有权限的玩家获得更高比例返点
  # 
  # 权限节点说明：
  # - 所有玩家默认获得5%返点（无需权限）
  # - VIP玩家需要拥有 alinvite.rebate.vip 权限才能获得15%返点
  # - 超级VIP玩家需要拥有 alinvite.rebate.svip 权限才能获得20%返点
  # - 至尊VIP玩家需要拥有 alinvite.rebate.mvip 权限才能获得25%返点
  # - 管理员需要拥有 alinvite.rebate.admin 权限（返点比例为0%）
  rebate_rates:
    base:
      rate: 0.05                # 5%返点比例（所有玩家默认，无需给玩家分配 alinvite.rebate.base 权限）
      weight: 0                  # 最低权重，确保所有玩家都有默认返点
    vip:
      rate: 0.15                # 15%返点比例（VIP玩家）
      weight: 2
    svip:
      rate: 0.20                # 20%返点比例（超级VIP玩家）
      weight: 3
    mvip:
      rate: 0.25                # 25%返点比例（至尊VIP玩家）
      weight: 4
    admin:
      rate: 0.00                # 0%返点比例（管理员不返点）
      weight: 99
    contribution:
      rate: 0.1                # 10%返点比例（贡献返点模式，只记录不发放）
      weight: 98
      contribution_mode: true           # 贡献返点模式，只记录返点数量，不发放点券
    
  # 限制设置
  limits:
    min_amount: 10.0            # 最小充值金额（小于此金额的充值不触发返点）
    max_rebate_per_day: 1000.0  # 单个玩家每日最大返点金额（防止刷返点）
    

    
  # 防重复机制
  anti_duplicate:
    enabled: true               # 是否启用防重复充值检查
    time_window: 10            # 时间窗口（秒），在此时间内相同金额的充值视为重复
  
  # 返点限制
  limits:
    min_amount: 10.0           # 最低充值金额（小于此金额的充值不触发返点）
    max_rebate_per_day: 1000.0  # 每日返点上限（单个邀请人一天内最多获得1000点券返点）

# ==================== 调试 ====================
debug: false                    # 是否输出调试日志
  # true: 显示详细的调试信息（用于排查问题）
  # false: 只显示正常的运行日志
  # 注意：生产环境建议关闭调试日志，以免影响性能
