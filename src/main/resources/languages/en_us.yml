# ============================================================
# ALInvite Language File - English (US)
# ============================================================

prefix: "&6[Invite System] &r"

commands:
  reload: "&aConfiguration reloaded"
  code: "&aYour invite code: &e{invite_code}"
  stats: |
    &a========== Invite Stats ==========
    &aYour invite code: &e{invite_code}
    &7Total invites: &e{total}
    &7Claimed milestones: &e{claimed_milestones}
    &7Current gift: &e{gift_name}
  buygift:
    success: "&aSuccessfully purchased gift {gift_name}&a! New players you invite will now receive this gift."
    switch_success: "&aSuccessfully switched to gift {gift_name}&a!"
    already_active: "&cGift {gift_name} &cis already your active gift!"
    fail_money: "&cInsufficient gold, need {price} gold"
    fail_points: "&cInsufficient points, need {price} points"
    already_owned: "&cYou already own this gift"
  admin:
    help: |
      &6===== ALInvite Admin Commands =====
      &e/alinvite admin help &7- Show help information
      &e/alinvite admin reload &7- Reload plugin config
      &e/alinvite admin givecode <player> &7- Generate invite code
      &e/alinvite admin clearcode <player> &7- Clear player invite code
      &e/alinvite admin addinvite <player> <amount> &7- Add invite count
      &e/alinvite admin reset <player> &7- Reset player data
      &e/alinvite admin announce <player> <milestone> &7- Send announcement
      &e/alinvite admin checkgroup <player> &7- Check permission group rewards
      &e/alinvite admin contrib <player> &7- View contribution rebate
      &e/alinvite admin contrib add <player> <amount> &7- Add contribution rebate
      &e/alinvite admin contrib set <player> <amount> &7- Set contribution rebate
      &e/alinvite admin contrib deduct <player> <amount> &7- Deduct contribution rebate
      &e/alinvite admin contrib clear <player> &7- Clear contribution rebate
      &e/alinvite admin contrib h <player> <amount> &7- Exchange contribution rebate
      &e/alinvite givedj <player> <amount> &7- Recharge points for player
      &6============================
    givecode_success: "&aGenerated invite code {invite_code} for player {player}"
    clearcode_success: "&aCleared invite code for player {player}"
    addinvite_success: "&aAdded {amount} invites for player {player}"
    reset_success: "&aReset invite data for player {player}"
    announce_success: "&aAnnouncement sent"
    contribution_deducted: "&aDeducted contribution rebate from player {player}: {amount} points"
    contribution_exchanged: "&aExchanged contribution rebate for player {player}: {amount} points issued"
    contribution_exchange_failed: "&aDeducted contribution rebate from player {player}: {amount} points, but points issuance failed"
    contribution_player_exchanged: "&aYou spent contribution rebate: {amount}, exchanged for points: {amount} points"
    contribution_player_deducted: "&aYour contribution rebate has been deducted: {amount} points"
  help: |
    &6===== ALInvite Commands =====
    &e/alinvite &7- Open invite menu
    &e/alinvite code &7- View your invite code
    &e/alinvite stats &7- View invite stats
    &6===== ALInvite Admin Commands =====
    &e/alinvite admin &7- Admin commands help

errors:
  player_only: "&cOnly players can execute this command"
  no_permission: "&cYou don't have permission"
  unknown: "&cUnknown command"
  invalid_code: "&cInvalid invite code"
  already_used: "&cYou have already used an invite code"
  veteran_cannot_bind: "&cYou are already a veteran player and cannot bind other veteran players' invite codes"
  no_invite_code: "&cYou have not unlocked the invite code yet"


points_rebate:
  rebate_given: "&aNew player &e{player}&a you invited recharged &6{amount}&a points, you received &e{rebate_amount}&a points rebate!"
  contribution_rebate_recorded: "&aNew player &e{player}&a you invited recharged &6{amount}&a points, you received &e{rebate_amount}&a contribution rebate (recorded)!"

milestone:
  reached: "&aCongratulations! You've reached {name} milestone and received rewards!"
  already_claimed: "&cYou have already claimed this milestone reward"
  claim_success: "&aClaimed {name} milestone reward"
  not_unlocked: "&c{name} milestone is locked. You need to invite {remaining} more players"
  unlocked: "&a{name} milestone unlocked! Please claim your reward in the menu!"

permission_group_reward:
  money: "&aPlayer &e{player} &ayou invited upgraded to &6{group}&a, you received &e{money} &agold reward!"
  points: "&aPlayer &e{player} &ayou invited upgraded to &6{group}&a, you received &e{points} &apoints reward!"
  offline_money: "&aPlayer &e{player} &ayou invited upgraded to &6{group}&a, you received &e{money} &agold reward (offline)!"
  offline_points: "&aPlayer &e{player} &ayou invited upgraded to &6{group}&a, you received &e{points} &apoints reward (offline)!"

dialog:
  cancel: "&cCancelled invite code input"
  timeout: "&cInput timeout, please click the button again"
  prompt: "&aPlease enter invite code (press {cancel_key} to cancel)"
  success: "&aInvite code verified! You received rewards"
  fail: "&cInvalid invite code"
  ip_limit: "&cYour IP has been used by another player for invite code"
  self_invite: "&cYou cannot use your own invite code"

function_restrictions:
  # 绑定成功时的功能权限提示
  bind_success_full: "&a✅ Bind successful! You will get all function permissions"
  bind_success_limited: "&a✅ Bind successful! But due to IP restrictions:"
  bind_success_milestone_enabled: "&7✅ Your bind will allow the veteran player to unlock milestone progress"
  bind_success_milestone_disabled: "&7❌ Your bind will not allow the veteran player to unlock milestone progress"
  bind_success_rebate_enabled: "&7✅ Your recharge will allow the veteran player to receive rebate"
  bind_success_rebate_disabled: "&7❌ Your recharge will not allow the veteran player to receive rebate"
  bind_success_gift_enabled: "&7✅ You will receive the new player gift"
  bind_success_gift_disabled: "&7❌ You will not receive the new player gift"
  
  # Bind failure prompt (when IP restriction is enabled)
  bind_failed_ip_restriction: "&c❌ Bind failed! Same IP binding has been restricted, please contact administrator"
