# ============================================================
# ALInvite 菜单配置文件
# 说明：基于 Shape 字符串布局，支持动态按钮
# ============================================================

# ----- 主菜单（玩家打开插件时看到的第一个菜单）-----
main_menu:
  title: "&6&l邀请系统"           # 菜单标题（支持颜色代码 &）
  shape:                           # 菜单布局（# 代表背景，字母代表按钮位置）
    - "#########"                  # 9个字符宽度
    - "#A#####B#"                  # A = 填写邀请码按钮，B = 邀请中心按钮
    - "#########"
  buttons:                         # 按钮定义
    A:                             # 按钮标识（对应 shape 中的 A）
      material: "WRITABLE_BOOK"    # 物品材质（可使用 Spigot 材质ID）
      custom-model-data: 0         # 自定义模型数据（用于资源包自定义物品）
      name: "&a&l填写邀请码"       # 物品显示名称（&a = 绿色，&l = 粗体）
      lore:                        # 物品描述（每行一条，支持颜色代码）
        - "&7绑定状态: &e{bind_status}"    # {bind_status} = 变量，会被替换为实际值
        - "&7邀请人: &e{inviter_name}"     # {inviter_name} = 邀请人名称
        - ""                               # 空行
        - "&7点击输入邀请码"
        - "&7获得新手礼包"
      action: "INPUT_CODE"                  # 点击按钮执行的动作
    B:
      material: "DIAMOND"
      custom-model-data: 0
      name: "&6&l邀请中心"
      lore:
        - "&7查看你的邀请统计"
        - "&7领取累计奖励"
        - "&7你的邀请码: &e&n{invite_code}"  # {invite_code} = 玩家自己的邀请码
        - "&7累计获得返点: &e{total_rebate} 点券"  # {total_rebate} = 累计获得的充值返点数量
        - "&7邀请更多玩家领取里程碑奖励"
        - "&7未解锁请升级玩家等级&aLV.2"
      action: "OPEN_VETERAN"                # 打开邀请中心菜单

# ----- 邀请中心（老玩家中心）-----
veteran_menu:
  title: "&6&l邀请中心"
  shape:
    - "B###G###A"                  # G = 当前礼包显示按钮
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "P#######N"                  # P = 上一页按钮，N = 下一页按钮
  shape2:
    - "########A"                  # G = 当前礼包显示按钮
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "#MMMMMMM#"                  # M = 里程碑进度按钮（可多格显示）
    - "P#######N"                  # P = 上一页按钮，N = 下一页按钮
  buttons:
    B:                             # 礼包商店入口
      material: "CHEST"
      custom-model-data: 0
      name: "&b&l礼包商店"
      lore:
        - "&7点击打开礼包商店"
        - "&7购买后，你邀请的新玩家将获得额外奖励"
      action: "OPEN_SHOP"
    G:                             # 当前礼包显示（动态按钮，会根据当前使用的礼包显示不同内容）
      dynamic: true                # 启用动态内容（会根据玩家当前礼包状态显示不同样式）
      material: "NETHER_STAR"
      custom-model-data: 0
      name: "&e当前礼包: {gift_name}"  # {gift_name} = 当前设置的礼包名称
      lore:
        - "&7当前设置的礼包"
        - "&a点击进入商店切换礼包"
        - "&7礼包内容:"
        - "{reward_lore_0}"           # 动态奖励描述行（根据礼包配置自动填充）
        - "{reward_lore_1}"
        - "{reward_lore_2}"
        - "{reward_lore_3}"
        - "{reward_lore_4}"
        - "{reward_lore_5}"
        - "{reward_lore_6}"
        - "{reward_lore_7}"
        - "{reward_lore_8}"
        - "{reward_lore_9}"
        - "{reward_lore_10}"
      action: "OPEN_SHOP"
    M:                             # 里程碑进度按钮
      dynamic: true
      material: "GOLD_BLOCK"
      custom-model-data: 0
      name: "&6&l{milestone_name}"     # {milestone_name} = 里程碑名称
      lore:
        - "&7邀请进度: &e{current}&7/&a{required}"  # {current} = 当前人数，{required} = 需求人数
        - "&7状态: &e{status_text}"                    # {status_text} = 状态文字
        - ""
        - "&7奖励预览:"
        - "{reward_lore_0}"
        - "{reward_lore_1}"
        - "{reward_lore_2}"
        - "{reward_lore_3}"
        - "{reward_lore_4}"
        - "{reward_lore_5}"
        - "{reward_lore_6}"
        - "{reward_lore_7}"
        - "{reward_lore_8}"
        - "{reward_lore_9}"
        - "{reward_lore_10}"
      action: "CLAIM_MILESTONE"                 # 领取里程碑奖励
      # 状态覆盖：根据里程碑状态显示不同样式
      state_overrides:                 # 动态按钮的不同状态样式
        locked:                        # 未解锁状态（邀请人数不足）
          material: "RED_STAINED_GLASS_PANE"
          custom-model-data: 0
          name: "&c&l{milestone_name}"
          lore:
            - "&7邀请进度: &c{current}&7/&a{required}"
            - "&7状态: &c未解锁"
            - "&7还需 &a{remaining} &7人解锁"     # {remaining} = 还需人数
            - ""
            - "&7奖励预览:"
            - "{reward_lore_0}"
            - "{reward_lore_1}"
            - "{reward_lore_2}"
            - "{reward_lore_3}"
            - "{reward_lore_4}"
            - "{reward_lore_5}"
            - "{reward_lore_6}"
            - "{reward_lore_7}"
            - "{reward_lore_8}"
            - "{reward_lore_9}"
            - "{reward_lore_10}"
        claimed:                       # 已领取状态
          material: "NETHER_STAR"
          custom-model-data: 0
          name: "&a&l{milestone_name}"
          lore:
            - "&7邀请进度: &a{current}&7/&a{required}"
            - "&7状态: &a✓ 已领取"
            - ""
            - "&7奖励预览:"
            - "{reward_lore_0}"
            - "{reward_lore_1}"
            - "{reward_lore_2}"
            - "{reward_lore_3}"
            - "{reward_lore_4}"
            - "{reward_lore_5}"
            - "{reward_lore_6}"
            - "{reward_lore_7}"
            - "{reward_lore_8}"
            - "{reward_lore_9}"
            - "{reward_lore_10}"
        available:                     # 可领取状态（达到要求但未领取）
          material: "GOLD_INGOT"
          custom-model-data: 0
          name: "&6&l{milestone_name}"
          lore:
            - "&7邀请进度: &e{current}&7/&a{required}"
            - "&7状态: &e可领取！"
            - "&a&l点击领取奖励"
            - ""
            - "&7奖励预览:"
            - "{reward_lore_0}"
            - "{reward_lore_1}"
            - "{reward_lore_2}"
            - "{reward_lore_3}"
            - "{reward_lore_4}"
            - "{reward_lore_5}"
            - "{reward_lore_6}"
            - "{reward_lore_7}"
            - "{reward_lore_8}"
            - "{reward_lore_9}"
            - "{reward_lore_10}"
    A:                             # 返回主菜单按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a返回主菜单"
      lore:
        - "&7点击返回主菜单"
      action: "OPEN_MAIN"
    P:                             # 上一页按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a上一页"
      lore:
        - "&7查看上一页里程碑"
      action: "PREV_PAGE"
    N:                             # 下一页按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a下一页"
      lore:
        - "&7查看下一页里程碑"
      action: "NEXT_PAGE"
    C:                             # 关闭按钮
      material: "BARRIER"
      custom-model-data: 0
      name: "&c关闭"
      lore:
        - "&7点击关闭菜单"
      action: "CLOSE"

# ----- 礼包商店菜单 -----
shop_menu:
  title: "&b&l礼包商店"
  shape:
    - "########R"
    - "#GGGGGGG#"                  # G = 礼包按钮（可显示多个礼包）
    - "#GGGGGGG#"                  # G = 礼包按钮（可显示多个礼包）
    - "P#######N"                  # P = 上一页按钮，N = 下一页按钮
  shape2:
    - "########R"
    - "#GGGGGGG#"                  # G = 礼包按钮（可显示多个礼包）
    - "#GGGGGGG#"                  # G = 礼包按钮（可显示多个礼包）
    - "P#######N"                  # P = 上一页按钮，N = 下一页按钮
  buttons:
    G:                             # 礼包按钮（动态，会根据礼包状态显示不同样式）
      dynamic: true
      material: "{material}"       # 动态材质（会根据礼包配置使用不同的物品）
      name: "{name}"               # 动态名称
      lore:
        - "&7价格: &e{price_money} 金币 &f/ &e{price_points} 点券"  # {price_money} = 金币价格，{price_points} = 点券价格
        - "&e点击购买"
        - "&7礼包内容:"
        - "{reward_lore_0}"
        - "{reward_lore_1}"
        - "{reward_lore_2}"
        - "{reward_lore_3}"
        - "{reward_lore_4}"
        - "{reward_lore_5}"
      action: "BUY_GIFT"           # 购买/切换礼包
      state_overrides:             # 礼包的不同状态样式
        current:                   # 当前正在使用的礼包
          material: "NETHER_STAR"
          name: "&6&l{name} &e(当前使用)"  # {name} = 礼包名称
          lore:
            - "&7价格: &e{price_money} 金币 &f/ &e{price_points} 点券"
            - "&a&l✓ 正在使用中"
            - "&7礼包内容:"
            - "{reward_lore_0}"
            - "{reward_lore_1}"
            - "{reward_lore_2}"
            - "{reward_lore_3}"
            - "{reward_lore_4}"
            - "{reward_lore_5}"
        purchased:                  # 已购买但未使用的礼包
          material: "NETHER_STAR"
          name: "&a&l{name} &a(已拥有)"
          lore:
            - "&7价格: &e{price_money} 金币 &f/ &e{price_points} 点券"
            - "&a&l✓ 点击切换为当前礼包"
            - "&7礼包内容:"
            - "{reward_lore_0}"
            - "{reward_lore_1}"
            - "{reward_lore_2}"
            - "{reward_lore_3}"
            - "{reward_lore_4}"
            - "{reward_lore_5}"
    A:                             # 返回主菜单按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a返回主菜单"
      lore:
        - "&7点击返回主菜单"
      action: "OPEN_MAIN"
    R:                             # 返回按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a返回邀请中心"
      lore:
        - "&7点击返回邀请中心"
      action: "BACK_TO_VETERAN"
    C:                             # 关闭按钮
      material: "BARRIER"
      custom-model-data: 0
      name: "&c关闭"
      action: "CLOSE"
    P:                             # 上一页按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a上一页"
      lore:
        - "&7查看上一页礼包"
      action: "PREV_PAGE"
    N:                             # 下一页按钮
      material: "ARROW"
      custom-model-data: 0
      name: "&a下一页"
      lore:
        - "&7查看下一页礼包"
      action: "NEXT_PAGE"

# ----- 通用背景填充 -----
# 用于填充菜单中的空白格子，使其看起来更美观
background:
  material: "BLACK_STAINED_GLASS_PANE"  # 背景材质（使用深色玻璃板）
  name: " "                              # 名称为空（不显示文字）
  lore: []                               # 描述为空
